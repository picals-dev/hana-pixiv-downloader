name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7.0.0

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2.9.1

      - name: 运行测试
        run: cargo test --locked --all-targets

      - name: 验证发布包
        run: cargo publish --dry-run --locked

  build:
    name: build-${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: hana-pixiv-downloader-aarch64-apple-darwin.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: hana-pixiv-downloader-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: hana-pixiv-downloader-x86_64-pc-windows-msvc.zip

    steps:
      - name: 检出代码
        uses: actions/checkout@v7.0.0

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2.9.1

      - name: 运行测试
        run: cargo test --locked --all-targets

      - name: 构建发布二进制
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: 打包 Unix 产物
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hpd dist/
          tar -czf ${{ matrix.archive_name }} -C dist hpd

      - name: 打包 Windows 产物
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/hpd.exe" "dist/hpd.exe"
          Compress-Archive -Path "dist/hpd.exe" -DestinationPath "${{ matrix.archive_name }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v7.0.0

      - name: 下载所有构建产物
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: 生成 SHA256
        run: |
          find artifacts -type f -exec sha256sum {} \; > SHA256SUMS.txt

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          body_path: .github/release-notes/${{ github.ref_name }}.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS.txt
          token: ${{ secrets.PICALS_GITHUB_TOKEN }}
